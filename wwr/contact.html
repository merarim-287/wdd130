<!DOCTYPE html>
<html lang="zxx">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="styles/rafting.css">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text&family=Flavors&display=swap" rel="stylesheet">

<body>
    <header>
        <div class="logo-box">
        <img src="images/logo.png" alt="logo">
        </div>
        <div class="flex-nav-box">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact</a>
        </nav>
        </div>
    </header>
    <main>
        <section>
        <div class="information">
            <h2>Company Information</h2>
            <ul>
                <li href="">Adress</li>
                <li href="">Phone Number</li>
                <li href="">Email</li>
            </ul>
            <nav class="map">
            <iframe
             src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d26850.881629658517!2d-111.
             81379651239978!3d41.26430710666852!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!
             1sen!2sus!4v1743800407274!5m2!1sen!2sus" width="600" height="450" style="" 
             allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </nav>
        </div>
        </section>
        <section>
            <div class="profiles">
                <h2>Staff</h2>
                <figure>
                    <img src="images/employee1.webp" alt="profile1">
                    <figcaption>General Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.webp" alt="profile2">
                    <figcaption>Tour Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.webp" alt="profile3">
                    <figcaption>First Aid</figcaption>
                </figure>
            </div>
        </section>
        <form>
            <fieldset>
                <legend>Contact Information</legend>
                <label for="fullname">Full Name: <input type="text" id="fullname" name="fullname"></label>
                <label for="useremail">Email: <input type="email" id="useremail" name="useremail"></label>
                <legend>Purpose of Message</legend>
                <select id="option" name="option">
                    <input type="radio" id="option" name="option" value="option">
                    <option value="General Inquiry">General Inquiry</option>
                    <option value="Reservation Question">Reservation Question</option>
                    <option value="Website Suggestion">Website Suggestion</option>
                </select>
                <label for="Message">Message</label>
                <textarea id="Message" name="Message" rows="5" placeholder="Hello my name is..."></textarea>
            </fieldset>
            <fieldset>
                <input type="checkbox" id="subscription" name="subscription" value="Subscribe me">
                <label for="subscription">Please subscribe me to the monthly newsletter.</label>
            </fieldset>
            <input type="submit" value="Submit">
        </form>
        
    </main>
    <footer>
        <p>©️2025, White Water Rafting, Merari M. Gonzalez</p>
